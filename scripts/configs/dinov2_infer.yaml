# DINOv2 k-NN inference config.
model: dinov2
# DINOv2 checkpoint and config used for embedding extraction.
weights: runs/dinov2/teacher_checkpoint.pth
dinov2_config: scripts/configs/sat_vit.yaml
dinov2_checkpoint_key: teacher
# Saved k-NN classifier artifact (.npz).
knn_classifier_path: runs/dinov2/knn_classifier_pw-s.npz
# Input images.
input_dir: data/PW-s/test
# Optional list of image paths (one per line).
# input_list: /path/to/image_list.txt
# Output CSV with predictions.
output_csv: runs/dinov2/knn_infer_pw-s.csv
# Optional override for k values (comma separated).
# k_values: "5,10,20,50,100"
# Softmax temperature override.
knn_softmax_temp: 0.07
# Embedding batch size.
batch_size: 128
# Dataloader workers.
num_workers: 4
# Resize/crop for eval transforms.
dinov2_resize: 256
dinov2_crop: 224
